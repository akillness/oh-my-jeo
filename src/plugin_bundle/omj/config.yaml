omj_home: "~/.omj"
status_limit: 3
hud_preset: focused
inject_context: true
privacy: metadata_only
claim_boundary: "Prepared handoffs are not execution, review, CI, merge-readiness, or merge evidence."
evidence:
  # Token-prefix allowlist for explicit local verification probes.
  # These commands are run with shell=False and bounded to the requested project_root.
  allowlist_prefixes:
    - "omj --help"
    - "omj doctor"
    - "omj probe"
    - "omj harness validate"
    - "omj docs workflows --check"
    - "omj release checklist"
    - "omj release product-readiness"
    - "omj release evidence-bundle"
    - "python -m unittest"
    - "python3 -m unittest"
    - "python -m compileall"
    - "python3 -m compileall"
    - "uv run python -m unittest"
    - "uv run python -m compileall"
    - "uv run python -m omj.cli docs workflows --check"
    - "uv run python -m omj.cli harness validate"
    - "git diff --check"
