<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1622"/>
      <stop offset="1" stop-color="#0e2233"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5fd0c5"/>
    </marker>
    <style>
      .title{fill:#e8f6ff;font-weight:700}
      .sub{fill:#9fc4d8}
      .stage{fill:#14334a;stroke:#2dd4bf;stroke-width:1.6;rx:11}
      .stagettl{fill:#e8f6ff;font-size:16px;font-weight:700;text-anchor:middle}
      .skill{fill:#7fe3d6;font-size:11px;text-anchor:middle;font-family:ui-monospace,Menlo,monospace}
      .gate{fill:#0f2a3d;stroke:#2a5a78;stroke-width:1;rx:8}
      .gatetxt{fill:#cfe9f5;font-size:10.5px;text-anchor:middle}
      .edge{stroke:#3f7e8f;stroke-width:1.8;fill:none}
      .band{fill:#10293c;stroke:#1d3b52;stroke-width:1;rx:10}
      .bandttl{fill:#7fe3d6;font-size:12px;font-weight:700}
      .bandtxt{fill:#bcd9e8;font-size:11.5px}
      .pill{fill:#0f2a3d;stroke:#2dd4bf;stroke-width:1.2;rx:12}
      .pilltxt{fill:#7fe3d6;font-size:11px;text-anchor:middle;font-weight:600}
    </style>
  </defs>

  <rect width="1100" height="430" fill="url(#bg)"/>
  <text x="40" y="46" class="title" font-size="24">oh-my-jeo · spec-first pipeline</text>
  <text x="40" y="70" class="sub" font-size="13">jeo-code workflow disciplines, mapped onto OMJ routing + evidence boundaries — every gate is repo-grounded, prepared ≠ observed.</text>
  <rect x="876" y="28" width="184" height="26" class="pill"/>
  <text x="968" y="45" class="pilltxt">jeo-code parity</text>

  <!-- stages -->
  <g>
    <!-- Clarify -->
    <rect x="40"  y="104" width="150" height="58" class="stage"/>
    <text x="115" y="130" class="stagettl">Clarify</text>
    <text x="115" y="149" class="skill">deep-interview</text>
    <!-- Seed -->
    <rect x="216" y="104" width="150" height="58" class="stage"/>
    <text x="291" y="130" class="stagettl">Seed</text>
    <text x="291" y="149" class="skill">immutable spec</text>
    <!-- Plan -->
    <rect x="392" y="104" width="150" height="58" class="stage"/>
    <text x="467" y="130" class="stagettl">Plan</text>
    <text x="467" y="149" class="skill">ralplan</text>
    <!-- Execute -->
    <rect x="568" y="104" width="150" height="58" class="stage"/>
    <text x="643" y="130" class="stagettl">Execute</text>
    <text x="643" y="149" class="skill">team / loop</text>
    <!-- Verify -->
    <rect x="744" y="104" width="150" height="58" class="stage"/>
    <text x="819" y="130" class="stagettl">Verify</text>
    <text x="819" y="149" class="skill">code-review</text>
    <!-- Complete -->
    <rect x="920" y="104" width="150" height="58" class="stage"/>
    <text x="995" y="130" class="stagettl">Complete</text>
    <text x="995" y="149" class="skill">ultragoal</text>
  </g>

  <!-- edges -->
  <path class="edge" d="M190,133 L214,133" marker-end="url(#arrow)"/>
  <path class="edge" d="M366,133 L390,133" marker-end="url(#arrow)"/>
  <path class="edge" d="M542,133 L566,133" marker-end="url(#arrow)"/>
  <path class="edge" d="M718,133 L742,133" marker-end="url(#arrow)"/>
  <path class="edge" d="M894,133 L918,133" marker-end="url(#arrow)"/>

  <!-- gates -->
  <g>
    <rect x="40"  y="180" width="150" height="48" class="gate"/>
    <text x="115" y="200" class="gatetxt">ambiguity ≤ 0.2</text>
    <text x="115" y="216" class="gatetxt">one question / turn</text>

    <rect x="216" y="180" width="150" height="48" class="gate"/>
    <text x="291" y="200" class="gatetxt">frozen seed +</text>
    <text x="291" y="216" class="gatetxt">acceptance criteria</text>

    <rect x="392" y="180" width="150" height="48" class="gate"/>
    <text x="467" y="200" class="gatetxt">contested options</text>
    <text x="467" y="216" class="gatetxt">kept, not collapsed</text>

    <rect x="568" y="180" width="150" height="48" class="gate"/>
    <text x="643" y="200" class="gatetxt">ordered subgoals,</text>
    <text x="643" y="216" class="gatetxt">failure feed-forward</text>

    <rect x="744" y="180" width="150" height="48" class="gate"/>
    <text x="819" y="200" class="gatetxt">severity + files named;</text>
    <text x="819" y="216" class="gatetxt">CLEAR / WATCH / BLOCK</text>

    <rect x="920" y="180" width="150" height="48" class="gate"/>
    <text x="995" y="200" class="gatetxt">criteria vs observed</text>
    <text x="995" y="216" class="gatetxt">evidence, no narration</text>
  </g>

  <!-- evidence boundary band -->
  <rect x="40" y="264" width="1030" height="62" class="band"/>
  <text x="60" y="290" class="bandttl">Evidence boundary — prepared ≠ observed</text>
  <text x="60" y="312" class="bandtxt">A frozen seed, a plan, a prepared handoff, or a review card is not execution, dispatch, CI, merge, or delivery. Status advances only when a wrapper/operator writes matching runtime evidence under runtime/.</text>

  <!-- footer -->
  <text x="40" y="362" class="sub" font-size="12">Roles: planner (seed-freeze · disagreement) · handoff-guide (subgoals · feed-forward) · reviewer (severity · structured verdict)</text>
  <text x="40" y="384" class="sub" font-size="12">Open CRITICAL/HIGH forces BLOCK or REQUEST-CHANGES. A clean verdict still names the files inspected. APPROVE = review-approved, not merged.</text>
  <text x="40" y="412" class="sub" font-size="11.5" fill="#6f9bb0">docs/WORKFLOW_PIPELINE.md · src/catalogs/roles.py · src/skills/catalog.py</text>
</svg>
